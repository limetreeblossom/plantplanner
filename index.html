<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flowerbed Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <!-- SVG icon sprite — inlined so <use href="#icon-x"> works without external HTTP request -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display: none" aria-hidden="true">
      <symbol id="icon-rect" viewBox="0 0 24 24">
        <rect width="18" height="18" x="3" y="3" rx="2" />
      </symbol>
      <symbol id="icon-circle" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" /></symbol>
      <symbol id="icon-ellipse" viewBox="0 0 24 24">
        <ellipse cx="12" cy="12" rx="10" ry="6" />
      </symbol>
      <symbol id="icon-polygon" viewBox="0 0 24 24">
        <path d="M3.5 8.7 12 2l8.5 6.7-3.2 9.9H6.7L3.5 8.7z" />
      </symbol>
      <symbol id="icon-save" viewBox="0 0 24 24">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="7 10 12 15 17 10" />
        <line x1="12" x2="12" y1="15" y2="3" />
      </symbol>
      <symbol id="icon-load" viewBox="0 0 24 24">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="17 8 12 3 7 8" />
        <line x1="12" x2="12" y1="3" y2="15" />
      </symbol>
      <symbol id="icon-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.3-4.3" />
      </symbol>
      <symbol id="icon-add-plant" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" />
        <path d="M8 12h8" />
        <path d="M12 8v8" />
      </symbol>
      <symbol id="icon-bg" viewBox="0 0 24 24">
        <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
        <circle cx="9" cy="9" r="2" />
        <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
      </symbol>
      <symbol id="icon-scale" viewBox="0 0 24 24">
        <path d="M5 8h8" />
        <path d="M5 12h4" />
        <path
          d="m10 2-5.243 5.243a3 3 0 0 0 0 4.243l9.757 9.757a1 1 0 0 0 1.414 0l5.243-5.243a1 1 0 0 0 0-1.414L11.414 4.343a3 3 0 0 0-4.243 0z"
        />
      </symbol>
      <symbol id="icon-export" viewBox="0 0 24 24">
        <path
          d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 0 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 0-2-2V9m0 0h18"
        />
      </symbol>
      <symbol id="icon-fill" viewBox="0 0 512 512">
        <path
          d="M453.7,243.3L453.7,243.3L262,51.6h0c-5.9-5.9-15.4-5.9-21.3,0L209.3,83l-67.2-67.2c-5.4-5.6-12.9-9.2-21.3-9.2c-16.4,0-29.7,13.3-29.7,29.8c0,8.5,3.6,16.1,9.3,21.6l66.9,66.9L4.4,287.9c-5.9,5.9-5.9,15.4,0,21.3l191.7,191.7c5.9,5.9,15.4,5.9,21.3,0l0,0l236.3-236.3C459.6,258.7,459.6,249.2,453.7,243.3z M336,298.4H78.2l173.3-173.3l128.9,128.9L336,298.4z"
        />
        <path
          d="M501.3,397.8L465.7,336l-0.6-1l-0.1-0.1l0,0c-1.8-2.5-4.7-4.1-8.1-4.1c-3,0-5.7,1.4-7.5,3.5l-0.1-0.1l-0.4,0.6c-0.5,0.7-1,1.4-1.3,2.2l-34.9,60.4c-6.8,9.2-10.9,20.5-10.9,32.8c0,30.4,24.6,55.1,55.1,55.1c30.4,0,55.1-24.7,55.1-55.1C512,418.1,508,406.9,501.3,397.8z"
        />
      </symbol>
    </svg>

    <div id="toolbar">
      <span id="app-title">Flowerbed Planner</span>

      <div class="sep"></div>
      <div class="toolbar-group">
        <span class="toolbar-group-label">Add flower bed</span>
        <div class="toolbar-group-btns">
          <button class="tool-btn tool-btn--icon" data-tool="rect" title="Rectangle (R)">
            <svg class="btn-icon" aria-hidden="true"><use href="#icon-rect"></use></svg>
          </button>
          <button class="tool-btn tool-btn--icon" data-tool="circle" title="Circle (C)">
            <svg class="btn-icon" aria-hidden="true"><use href="#icon-circle"></use></svg>
          </button>
          <button class="tool-btn tool-btn--icon" data-tool="ellipse" title="Ellipse (E)">
            <svg class="btn-icon" aria-hidden="true"><use href="#icon-ellipse"></use></svg>
          </button>
          <button class="tool-btn tool-btn--icon" data-tool="polygon" title="Polygon (P)">
            <svg class="btn-icon" aria-hidden="true"><use href="#icon-polygon"></use></svg>
          </button>
        </div>
      </div>

      <div class="sep"></div>
      <div class="toolbar-group">
        <span class="toolbar-group-label">Canvas</span>
        <div class="toolbar-group-btns">
          <button
            class="tool-btn"
            id="import-bg-btn"
            title="Import background image (blueprint/map)"
          >
            <svg class="btn-icon" aria-hidden="true"><use href="#icon-bg"></use></svg>
            Add background
          </button>
          <input type="file" id="bg-file-input" accept="image/*" style="display: none" />
          <button
            class="tool-btn"
            data-tool="calibrate"
            title="Calibrate scale by clicking two known points"
          >
            <svg class="btn-icon" aria-hidden="true"><use href="#icon-scale"></use></svg>
            Set scale
          </button>
        </div>
      </div>

      <div class="sep"></div>
      <div class="toolbar-group">
        <span class="toolbar-group-label">Project</span>
        <div class="toolbar-group-btns">
          <input
            type="text"
            id="project-name"
            placeholder="Project name"
            title="Project name (used as filename on save)"
          />
          <button class="tool-btn tool-btn--icon" id="save-btn" title="Save project to file">
            <svg class="btn-icon" aria-hidden="true"><use href="#icon-save"></use></svg>
          </button>
          <button class="tool-btn tool-btn--icon" id="load-btn" title="Load project from file">
            <svg class="btn-icon" aria-hidden="true"><use href="#icon-load"></use></svg>
          </button>
          <input type="file" id="load-file-input" accept=".json" style="display: none" />
        </div>
      </div>
      <div class="sep"></div>
    </div>

    <div id="workspace">
      <div id="left-panel">
        <div id="left-panel-header">
          <h2>Plants</h2>
          <button
            id="fill-mode-btn"
            class="tool-btn tool-btn--icon"
            title="Fill mode — drop plant fills entire shape (F)"
          >
            <svg class="btn-icon btn-icon--filled" aria-hidden="true">
              <use href="#icon-fill"></use>
            </svg>
          </button>
        </div>
        <div class="panel-section-label">Search</div>
        <div class="search-wrapper">
          <svg class="btn-icon search-icon" aria-hidden="true"><use href="#icon-search"></use></svg>
          <input
            type="search"
            id="plant-search"
            placeholder="Search to find plants"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <div id="search-results"></div>
        <div id="custom-plants-section">
          <div class="panel-divider"></div>
          <div class="panel-section-label">My plants</div>
          <div
            id="custom-plants-list"
            style="padding: 0 10px 4px; display: flex; flex-direction: column; gap: 4px"
          ></div>
        </div>
        <div style="padding: 6px 10px 8px; flex-shrink: 0">
          <button id="add-custom-plant-btn" class="tool-btn">
            <svg class="btn-icon" aria-hidden="true"><use href="#icon-add-plant"></use></svg>
            Add plant
          </button>
        </div>
        <div id="used-plants-section">
          <div class="panel-divider"></div>
          <div class="panel-section-label">Current plants</div>
          <div id="used-plants"></div>
        </div>
      </div>

      <div id="canvas-container">
        <div id="canvas-wrap">
          <div id="ruler-corner"></div>
          <canvas id="h-ruler" height="20"></canvas>
          <canvas id="v-ruler" width="20"></canvas>
          <svg
            id="canvas"
            viewBox="0 0 900 600"
            preserveAspectRatio="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <g id="bg-layer"></g>
            <g id="grid-layer"></g>
            <g id="shapes-layer"></g>
            <g id="flowers-layer"></g>
            <g id="trees-layer"></g>
            <g id="overlay-layer"></g>
            <g id="legend-group"></g>
          </svg>
        </div>
      </div>

      <div id="right-panel">
        <!-- View -->
        <div class="panel-section">
          <h2>View</h2>
          <div style="display: flex; flex-direction: column; gap: 8px; padding: 4px 0">
            <label class="toggle-wrap" title="Show/hide trees">
              <input type="checkbox" id="trees-toggle" checked />
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
              <span>Trees</span>
            </label>
            <label class="toggle-wrap" title="Show/hide flowers">
              <input type="checkbox" id="flowers-toggle" checked />
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
              <span>Flowers</span>
            </label>
            <label class="toggle-wrap" title="Show/hide CC spacing rings">
              <input type="checkbox" id="rings-toggle" checked />
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
              <span>Spacing (CC)</span>
            </label>
            <label class="toggle-wrap" title="Show/hide background image">
              <input type="checkbox" id="bg-toggle" checked />
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
              <span>Background image</span>
            </label>
            <label class="toggle-wrap" title="Show/hide grid">
              <input type="checkbox" id="grid-toggle" checked />
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
              <span>Grid</span>
            </label>
            <label class="toggle-wrap" title="Show/hide canvas legend">
              <input type="checkbox" id="legend-check" checked />
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
              <span>Legend</span>
            </label>
          </div>
        </div>

        <!-- Running plant totals -->
        <div class="panel-section" id="summary-section">
          <div class="panel-section-header">
            <h2>Plant Summary</h2>
            <button id="export-xls-btn" class="btn-sm" title="Export plant summary to Excel">
              <svg class="btn-icon" aria-hidden="true"><use href="#icon-save"></use></svg>
            </button>
          </div>
          <div id="summary-content">
            <div class="info-empty">No plants placed yet.</div>
          </div>
        </div>
      </div>
    </div>

    <div id="shape-tooltip"></div>

    <div id="plant-img-tooltip">
      <img id="plant-tip-img" src="" alt="" />
      <div class="plant-tip-sci" id="plant-tip-sci"></div>
      <div class="plant-tip-name" id="plant-tip-name"></div>
      <div class="plant-tip-meta" id="plant-tip-meta"></div>
    </div>
    <!-- Custom plant add/edit dialog -->
    <div id="custom-plant-dialog">
      <div id="custom-plant-form">
        <h3 id="cp-dialog-title">Add plant</h3>
        <label>Name <input type="text" id="cp-name" placeholder="e.g. My Lavender" /></label>
        <label
          >Spacing (m)
          <input type="number" id="cp-spacing" min="0.10" max="3.0" step="0.01" value="0.30"
        /></label>
        <label>Color <input type="color" id="cp-color" value="#90a4ae" /></label>
        <label
          >Growth habit
          <select id="cp-growth">
            <option value="flower">Flower / herb</option>
            <option value="shrub">Shrub</option>
            <option value="tree">Tree</option>
            <option value="grass">Grass</option>
            <option value="fern">Fern</option>
            <option value="vine">Vine</option>
          </select>
        </label>
        <label
          >Height (cm)
          <input type="number" id="cp-height" min="1" max="5000" step="1" placeholder="optional"
        /></label>
        <div class="cp-form-btns">
          <button id="cp-cancel-btn">Cancel</button>
          <button id="cp-save-btn">Save</button>
        </div>
      </div>
    </div>

    <div id="plant-edit-popover">
      <label
        >Spacing (m) <input type="number" id="edit-spacing" min="0.10" max="3.0" step="0.01"
      /></label>
      <label>Color <input type="color" id="edit-color" /></label>
      <div class="edit-popover-btns">
        <button id="edit-cancel-btn">Cancel</button>
        <button id="edit-save-btn">Save</button>
      </div>
    </div>

    <div
      id="calib-overlay"
      style="
        display: none;
        position: fixed;
        background: #fff;
        border: 1px solid #999;
        border-radius: 6px;
        padding: 8px 12px;
        z-index: 100;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      "
    >
      <label style="font-size: 13px"
        >Distance (m):
        <input id="calib-input" type="number" min="0.01" step="0.01" style="width: 70px" />
      </label>
      <button id="calib-ok">OK</button>
      <button id="calib-cancel">Cancel</button>
    </div>

    <div id="status-bar">
      <span id="scale-info">Scale: 1 m = 100 px</span>
      <span>|</span>
      <span>Canvas: 9 m &times; 6 m</span>
      <span id="status-msg"></span>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
